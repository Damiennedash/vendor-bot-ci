services:
  - type: web
    name: vendor-bot-ci
    env: python
    runtime: python-3.11.9
    plan: free
    region: oregon
    buildCommand: "python -m pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "python -m app.main"
    # ⚠️  Ajoutez les variables ci-dessous directement dans Render Dashboard
    # Ne jamais mettre les valeurs secrètes dans ce fichier
    envVars:
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        value: "1237901896061973"
      - key: WHATSAPP_VERIFY_TOKEN
        value: fanmilk_ci_webhook_2024
      - key: GOOGLE_SHEET_ID
        value: 1dUMWHYe3ApBtceZZ4oqjgYDk88gKGYLwN5jkW_6-r1s
      - key: GOOGLE_SHEET_TAB
        value: Reponses Vendors
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
